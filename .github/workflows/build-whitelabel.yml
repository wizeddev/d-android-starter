name: Dynamic White-label Build

on:
  workflow_dispatch:
    inputs:
      package_name:
        description: 'New Package Name (applicationId)'
        required: true
        type: string
      keystore_url:
        description: 'URL to download the keystore file (.jks or .keystore)'
        required: true
        type: string
      keystore_password:
        description: 'Keystore Password'
        required: true
        type: string
      key_alias:
        description: 'Key Alias'
        required: true
        type: string
      key_password:
        description: 'Key Password'
        required: true
        type: string

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'
          cache: 'gradle'

      - name: Set Execute Permission for Gradlew
        run: chmod +x gradlew

      - name: Download Keystore
        run: |
          # Download the keystore file to the app directory
          curl -L "${{ github.event.inputs.keystore_url }}" -o app/release.jks

      - name: Build Signed AAB
        run: |
          # Build the AAB with dynamic package name and signing info
          ./gradlew :app:bundleRelease \
            -PAPP_ID="${{ github.event.inputs.package_name }}" \
            -PKS_FILE="release.jks" \
            -PKS_PASSWORD="${{ github.event.inputs.keystore_password }}" \
            -PKEY_ALIAS="${{ github.event.inputs.key_alias }}" \
            -PKEY_PASSWORD="${{ github.event.inputs.key_password }}"

      - name: Upload Signed AAB
        uses: actions/upload-artifact@v4
        with:
          name: app-release-${{ github.event.inputs.package_name }}
          path: app/build/outputs/bundle/release/*.aab
